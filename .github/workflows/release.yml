name: Release

# Tags use the 1.1 or 1.1.0 form (no leading v).
on:
  push:
    tags:
      - "[0-9]+.[0-9]+"
      - "[0-9]+.[0-9]+.[0-9]+"

defaults:
  run:
    shell: bash

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-x86_64
          - os: macos-latest
            name: macos-arm64
          - os: windows-latest
            name: windows-x86_64
    steps:
      - uses: actions/checkout@v4

      - name: Install DevIL (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libdevil-dev

      - name: Install DevIL (macOS)
        if: runner.os == 'macOS'
        run: brew install devil

      - name: Install DevIL (Windows)
        if: runner.os == 'Windows'
        run: vcpkg install devil:x64-windows

      - name: Configure
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            cmake -S . -B build \
              -DCMAKE_TOOLCHAIN_FILE="$VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"
          else
            cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          fi

      - name: Build
        run: cmake --build build --config Release

      - name: Install to dist
        run: cmake --install build --prefix dist --config Release

      - name: Bundle DevIL runtime DLLs (Windows)
        if: runner.os == 'Windows'
        run: cp "$VCPKG_INSTALLATION_ROOT"/installed/x64-windows/bin/*.dll dist/bin/ || true

      - name: Package
        run: |
          tar -czf "SpringMapConvNG-${GITHUB_REF_NAME}-${{ matrix.name }}.tar.gz" -C dist/bin .

      - uses: actions/upload-artifact@v4
        with:
          name: SpringMapConvNG-${{ matrix.name }}
          path: SpringMapConvNG-*.tar.gz

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: artifacts/*.tar.gz
