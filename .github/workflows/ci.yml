name: CI

on:
  push:
    branches: [master]
  pull_request:

defaults:
  run:
    shell: bash

jobs:
  lint:
    name: clang-format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Install clang-format
        run: pip install clang-format==20.1.8
      - name: Check formatting
        run: clang-format --dry-run --Werror src/*.cpp src/*.h

  build:
    name: build (${{ matrix.os }})
    needs: lint
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install DevIL (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libdevil-dev

      - name: Install DevIL (macOS)
        if: runner.os == 'macOS'
        run: brew install devil

      - name: Install DevIL (Windows)
        if: runner.os == 'Windows'
        run: vcpkg install devil:x64-windows

      - name: Configure
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            cmake -S . -B build \
              -DCMAKE_TOOLCHAIN_FILE="$VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"
          else
            cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          fi

      - name: Build
        run: cmake --build build --config Release
